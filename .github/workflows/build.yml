name: Build APK and AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_HOME: /home/runner/android-sdk

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip
          mkdir -p $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          rm cmdtools.zip
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          wget -q "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -O gradle/wrapper/gradle-wrapper.jar

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Create Release Keystore
        run: |
          mkdir -p keystore
          keytool -genkeypair -v \
            -keystore keystore/release.jks \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=AppForge, OU=Mobile, O=AppForge, L=Istanbul, ST=Istanbul, C=TR"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30